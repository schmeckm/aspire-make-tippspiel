services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-wm2026}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme-set-in-portainer}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${DB_USER:-postgres}", "-d", "${DB_NAME:-wm2026}"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s
    restart: unless-stopped

  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/schmeckm/aspire-make-tippspiel-backend:latest}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    environment:
      NODE_ENV: production
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET:-changeme-set-a-long-random-jwt-secret-in-portainer}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
      DB_DIALECT: postgres
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-wm2026}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-changeme-set-in-portainer}
      OPEN_REGISTRATION: ${OPEN_REGISTRATION:-true}
      FOOTBALL_API_PROVIDER: ${FOOTBALL_API_PROVIDER:-football-data}
      FOOTBALL_API_BASE_URL: ${FOOTBALL_API_BASE_URL:-https://api.football-data.org/v4}
      FOOTBALL_API_KEY: ${FOOTBALL_API_KEY:-}
      FOOTBALL_API_COMPETITION_ID: ${FOOTBALL_API_COMPETITION_ID:-WC}
      FOOTBALL_API_COMPETITION_NUMERIC_ID: ${FOOTBALL_API_COMPETITION_NUMERIC_ID:-2000}
      FOOTBALL_API_SEASON: ${FOOTBALL_API_SEASON:-2026}
      FOOTBALL_API_TIMEZONE: ${FOOTBALL_API_TIMEZONE:-Europe/Zurich}
      FOOTBALL_API_SYNC_ENABLED: ${FOOTBALL_API_SYNC_ENABLED:-true}
      FOOTBALL_API_RESULT_SYNC_ENABLED: ${FOOTBALL_API_RESULT_SYNC_ENABLED:-true}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      AI_FEATURES_ENABLED: ${AI_FEATURES_ENABLED:-true}
      AI_CACHE_ENABLED: ${AI_CACHE_ENABLED:-true}
      AI_MAX_TOKENS: ${AI_MAX_TOKENS:-800}
      AI_TEMPERATURE: ${AI_TEMPERATURE:-0.4}
      AI_ADMIN_FEATURES_ENABLED: ${AI_ADMIN_FEATURES_ENABLED:-true}
      AI_USER_COACH_ENABLED: ${AI_USER_COACH_ENABLED:-true}
      AI_MATCH_PREVIEW_ENABLED: ${AI_MATCH_PREVIEW_ENABLED:-true}
      AI_LEADERBOARD_COMMENTARY_ENABLED: ${AI_LEADERBOARD_COMMENTARY_ENABLED:-true}
      APP_URL: ${APP_URL:-http://localhost:8080}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      PLAYER_IMAGE_ENABLED: ${PLAYER_IMAGE_ENABLED:-true}
      PLAYER_IMAGE_THESPORTSDB_API_KEY: ${PLAYER_IMAGE_THESPORTSDB_API_KEY:-123}
      THESPORTSDB_VENUE_ENRICHMENT_ENABLED: ${THESPORTSDB_VENUE_ENRICHMENT_ENABLED:-true}
      THESPORTSDB_LEAGUE_ID: ${THESPORTSDB_LEAGUE_ID:-4429}
      THESPORTSDB_SEASON: ${THESPORTSDB_SEASON:-2026}
    volumes:
      - backend-uploads:/app/uploads
      - backend-backups:/app/backups
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/schmeckm/aspire-make-tippspiel-frontend:latest}
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres-data:
  backend-uploads:
  backend-backups:
